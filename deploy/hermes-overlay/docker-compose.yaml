# ─────────────────────────────────────────────────────────────────────────────
# Local sandbox: consciousness-gateway (upstream) → agentgateway (overlay) → Hermes
# ─────────────────────────────────────────────────────────────────────────────
# Three logical services as requested:
#   1. agentgateway       — official binary + bundled Hermes runtime (overlay).
#   2. hermes-mcp-env      — NOT a long-running service: Hermes is spawned per
#                            connection by agentgateway INSIDE its container.
#                            Represented here by the shared volumes + build args
#                            (stdio is process-local; it cannot be a peer container).
#   3. consciousness-gateway — stubbed upstream that exercises the HTTP surface.
#
# Bring up:   docker compose up --build
# Tear down:  docker compose down -v

name: hermes-overlay

services:

  # ── 1. agentgateway overlay (bundles Hermes + npx/uvx MCP servers) ──────────
  agentgateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-overlay/agentgateway:local
    container_name: agentgateway
    restart: unless-stopped
    command: ["-f", "/etc/agentgateway/config.yaml"]
    ports:
      - "3000:3000"     # MCP data plane (Streamable HTTP + SSE) → /mcp
      - "15000:15000"   # admin UI (confirm port via `agentgateway --help`)
      - "15020:15020"   # Prometheus metrics → /metrics
    environment:
      RUST_LOG: "info"                                # raise to debug when needed
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"               # Phase 2 only
      # Downstream secret available to the spawned Hermes child (inherited env).
      HERMES_AUTH_TOKEN: "${HERMES_INTERNAL_SECRET:-sandbox-internal}"
      # git target reads a host-owned, read-only mount: trust the dir and skip
      # optional locks so `git status` doesn't try to write on the RO mount.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "*"
      GIT_OPTIONAL_LOCKS: "0"
    volumes:
      - ./agentgateway.yaml:/etc/agentgateway/config.yaml:ro
      # Hermes session store (~/.hermes). Pre-seed config.yaml + a registered
      # agent/channel here so messages_send has somewhere to land.
      - hermes-home:/home/hermes/.hermes
      # Phase-1 read-only posture: /workspace is mounted READ-ONLY so the
      # filesystem target cannot mutate the tree even if write tools fire.
      - ./workspace:/workspace:ro
      # The Gateway's OWN repo, read-only, for the git target only (history/
      # status). Kept separate from /workspace so the filesystem tool never sees
      # .env or other untracked secrets. ../.. = consciousness-gateway repo root.
      - ../..:/repo:ro
    healthcheck:
      # Hit the stats endpoint (proves the process is up + config loaded)
      # WITHOUT doing a full MCP initialize — otherwise every healthcheck would
      # spawn and tear down all stdio children. The probe + real clients still
      # exercise /mcp end-to-end.
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:15020/metrics >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 3. consciousness-gateway (stubbed upstream) ─────────────────────────────
  # In production this is the real TypeScript gateway with:
  #     HERMES_MCP_URL=http://agentgateway:3000/mcp
  # Its existing HTTP HermesBridge then works unchanged — no stdio handling.
  # Here we stub it as a probe that discovers + calls a tool through the overlay.
  consciousness-gateway:
    image: curlimages/curl:8.11.0
    container_name: consciousness-gateway
    depends_on:
      agentgateway:
        condition: service_healthy
    environment:
      HERMES_MCP_URL: "http://agentgateway:3000/mcp"
    volumes:
      - ./upstream-probe.sh:/upstream-probe.sh:ro
    entrypoint: ["sh", "/upstream-probe.sh"]

  # ── Observability stack (Kern's visibility asks) ────────────────────────────
  # Prometheus scrapes agentgateway :15020/metrics → counts by namespace,
  # latency histograms (p50/p95/p99 via histogram_quantile), failure rates.
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    depends_on: [agentgateway]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Jaeger receives OTLP traces (mcp.method, mcp.session_id) → session lifecycle
  # (created / expired / orphaned) and per-call spans.
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (agentgateway tracing.otlpEndpoint)

  # Grafana for the latency-distribution / failure-rate dashboards Kern wants.
  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana
    depends_on: [prometheus]
    ports:
      # Host 3001 is reserved by the trading module (Schwab OAuth:
      # localhost:3001/auth/schwab). Use 3030 to avoid the collision.
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ALLOW_EMBEDDING: "true"

volumes:
  hermes-home:
