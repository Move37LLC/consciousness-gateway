# Scrapes the agentgateway overlay's Prometheus endpoint so Kern gets:
#   - tool-call counts by target namespace (hermes / git / filesystem / fetch / time)
#   - request latency histograms → p50 / p95 / p99 via histogram_quantile
#   - failure rates by tool / status
# Confirm exact metric names against http://localhost:15020/metrics on first run
# (agentgateway exposes MCP tool-call counters + request-duration histograms).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: agentgateway
    metrics_path: /metrics
    static_configs:
      - targets: ["agentgateway:15020"]
